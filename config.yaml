# ─────────────────────────────────────────
# RF Signal Classifier - Central Config
# ─────────────────────────────────────────

project:
  name: "RF Signal Classifier"
  version: "0.1.0"
  random_seed: 42

# ─────────────────────────────────────────
# Paths
# ─────────────────────────────────────────
paths:
  raw_data: "data/raw/RML2016.10a_dict.pkl"
  processed_data: "data/processed/"
  figures: "reports/figures/"
  database: "data/rf_signals.db"
  models: "models/"

# ─────────────────────────────────────────
# Signal Processing
# ─────────────────────────────────────────
signal:
  sample_length: 128       # Number of IQ samples per signal
  fft_size: 128            # FFT size
  snr_levels:              # Available SNR levels in dataset
    min: -20
    max: 18
    step: 2

# ─────────────────────────────────────────
# Modulation Types
# ─────────────────────────────────────────
modulations:
  - "AM-DSB"
  - "AM-SSB"
  - "WBFM"
  - "BPSK"
  - "QPSK"
  - "8PSK"
  - "QAM16"
  - "QAM64"
  - "CPFSK"
  - "GFSK"
  - "PAM4"

# ─────────────────────────────────────────
# Database
# ─────────────────────────────────────────
database:
  name: "rf_signals.db"
  path: "data/"
  tables:
    signals: "signals"
    features: "features"
    predictions: "predictions"

# ─────────────────────────────────────────
# Model
# ─────────────────────────────────────────
model:
  type: "xgboost"
  test_size: 0.2
  val_size: 0.1
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  n_jobs: -1

# ─────────────────────────────────────────
# Streamlit App
# ─────────────────────────────────────────
app:
  title: "RF Signal Classifier"
  port: 8501